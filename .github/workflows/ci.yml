name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.10"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.12 python3.12-venv python3-gi gir1.2-atspi-2.0 gir1.2-gtk-3.0
      - name: Bootstrap project environment
        run: ./scripts/bootstrap.sh
      - name: Verify
        run: ./scripts/check.sh
      - name: Test
        run: uv run --active pytest tests/ -v
